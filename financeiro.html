<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duos Marketing — Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4fa;--bg2:#fff;--bg3:#e8eef7;--border:#dce5f0;--border2:#c4d3e8;
  --text:#0f1c2e;--text2:#4a6080;--text3:#8aa0bc;
  --blue:#1a56db;--blue2:#1e429f;--blue-light:#e8f0fe;--blue-mid:#3b82f6;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#d97706;--amber-light:#fef3c7;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(15,28,46,.08),0 1px 2px rgba(15,28,46,.04);
  --shadow-md:0 4px 16px rgba(15,28,46,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px 36px;width:100%;max-width:360px;box-shadow:var(--shadow-md);text-align:center}
.login-logo{width:48px;height:48px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.login-title{font-size:20px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;font-family:'JetBrains Mono',monospace}
.login-field{position:relative;margin-bottom:14px}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 44px 12px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;letter-spacing:.05em}
.login-field input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-field input.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;line-height:1}
.eye-btn:hover{color:var(--text2)}
.login-err{font-size:12px;color:var(--red);margin-bottom:12px;min-height:18px;font-family:'JetBrains Mono',monospace}
.login-btn{width:100%;background:var(--blue);color:#fff;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;padding:12px;border-radius:var(--radius);border:none;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--blue2)}
.login-btn:active{transform:scale(.98)}

/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.month-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-size:13px;padding:6px 10px;border-radius:var(--radius);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.month-btn:hover{background:var(--bg3);border-color:var(--blue-mid);color:var(--blue)}
.month-display{font-size:14px;font-weight:500;min-width:110px;text-align:center;font-family:'JetBrains Mono',monospace}
.sync-status{font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:20px;border:1px solid;display:flex;align-items:center;gap:5px;transition:all .3s}
.sync-ok{color:var(--green);background:var(--green-light);border-color:rgba(5,150,105,.2)}
.sync-saving{color:var(--amber);background:var(--amber-light);border-color:rgba(217,119,6,.2)}
.sync-err{color:var(--red);background:var(--red-light);border-color:rgba(220,38,38,.2)}
.sync-off{color:var(--text3);background:var(--bg3);border-color:var(--border)}
.btn-google{display:flex;align-items:center;gap:7px;background:var(--blue);color:#fff;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;transition:background .15s}
.btn-google:hover{background:var(--blue2)}
.btn-lock{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border2);color:var(--text3);font-size:12px;font-family:'Inter',sans-serif;padding:7px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.btn-lock:hover{border-color:var(--red);color:var(--red)}
.container{max-width:1100px;margin:0 auto;padding:24px 32px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.scard.hi{background:var(--blue);border-color:var(--blue2)}
.scard.hi .sc-label,.scard.hi .sc-sub{color:rgba(255,255,255,.6)}
.scard.hi .sc-val{color:#fff}
.scard.hi .abar{background:rgba(255,255,255,.4)}
.abar{width:20px;height:3px;border-radius:2px;background:var(--blue);margin-bottom:10px}
.sc-label{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.sc-val{font-size:20px;font-weight:600}
.sc-sub{font-size:11px;color:var(--text3);margin-top:4px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.ph{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap;gap:8px}
.pt{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-family:'JetBrains Mono',monospace}
.pbadge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:20px;font-weight:500}
.bg{background:var(--green-light);color:var(--green)}
.br{background:var(--red-light);color:var(--red)}
.bb{background:var(--blue-light);color:var(--blue)}
.ba{background:var(--amber-light);color:var(--amber)}
.bp{background:var(--purple-light);color:var(--purple)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'JetBrains Mono',monospace;padding:8px 14px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg2)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.tn{color:var(--text);font-weight:500}
.tv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--text)}
.sbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.sp{background:var(--green-light);color:var(--green)}.sp:hover{background:#a7f3d0}
.se{background:var(--amber-light);color:var(--amber)}.se:hover{background:#fde68a}
.sa{background:var(--red-light);color:var(--red)}.sa:hover{background:#fecaca}
.vbadge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 7px;border-radius:6px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.vh{background:var(--amber-light);color:var(--amber);border-color:rgba(217,119,6,.2)}
.vat{background:var(--red-light);color:var(--red);border-color:rgba(220,38,38,.2)}
.erow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.erow:last-child{border-bottom:none}
.erow:hover{background:var(--bg3)}
.en{font-size:13px;font-weight:500;color:var(--text)}
.ed{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.ev{font-size:14px;font-weight:600;color:var(--red);font-family:'JetBrains Mono',monospace}
.eactions{display:flex;gap:4px;align-items:center}
.lucro-block{padding:18px}
.lucro-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.avb{background:var(--blue-light);color:var(--blue2)}
.avp{background:var(--purple-light);color:var(--purple)}
.pname{font-size:14px;font-weight:500}
.ppct{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.lval{font-size:20px;font-weight:600;color:var(--green);font-family:'JetBrains Mono',monospace}
.pbar{width:100%;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:12px}
.pfill{height:100%;border-radius:4px;background:var(--blue)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,28,46,.55);z-index:100;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:26px;width:100%;max-width:440px;box-shadow:var(--shadow-md);margin:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:500;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
input,select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
select option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mactions{display:flex;gap:10px;margin-top:18px}
.bsave{flex:1;background:var(--blue);color:#fff;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;padding:10px;border-radius:var(--radius);border:none;cursor:pointer;transition:background .15s}
.bsave:hover{background:var(--blue2)}
.bcancel{background:none;border:1px solid var(--border2);color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;padding:10px 16px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.bcancel:hover{background:var(--bg3)}
.badd{display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);color:var(--blue2);font-size:12px;font-weight:500;font-family:'Inter',sans-serif;padding:7px 13px;border-radius:var(--radius);border:1px solid rgba(26,86,219,.2);cursor:pointer;transition:all .15s}
.badd:hover{background:#d1e0fc}
.bicon{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px 5px;border-radius:5px;font-size:13px;line-height:1;transition:all .12s}
.bicon:hover{color:var(--blue);background:var(--blue-light)}
.bicon.del:hover{color:var(--red);background:var(--red-light)}
.dsec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.dsec::after{content:'';flex:1;height:1px;background:var(--border)}
.loading-overlay{position:fixed;inset:0;background:rgba(240,244,250,.9);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2);font-family:'JetBrains Mono',monospace}
@media(max-width:900px){.summary-grid{grid-template-columns:repeat(3,1fr)}.two-col{grid-template-columns:1fr}.container{padding:16px}.topbar{padding:14px 16px}}
@media(max-width:560px){.summary-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".3"/></svg>
    </div>
    <div class="login-title">Duos Marketing</div>
    <div class="login-sub">financeiro · acesso restrito</div>
    <div class="login-field">
      <input type="password" id="login-input" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="eye-btn" onclick="toggleEye()" id="eye-btn" title="Mostrar senha">👁</button>
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Conectando ao Google...</div>
  </div>

  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".6"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".3"/></svg>

      </button>
      <button class="btn-google" onclick="signOut()" id="btn-signout" style="display:none;background:var(--text3)">Desconectar</button>
      <button class="btn-lock" onclick="doLogout()">🔒 Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="summary-grid" id="summary-grid"></div>

    <div class="dsec">Receitas</div>
    <div class="panel">
      <div class="ph">
        <span class="pt">Clientes</span>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span id="badge-pg" class="pbadge bg"></span>
          <span id="badge-pd" class="pbadge ba"></span>
          <button class="badd" onclick="openModal('cliente')">

        </div>

        <tbody id="tbody-clientes"></tbody></table>
      </div>
    </div>

    <div class="dsec">Gastos</div>
    <div class="two-col">
      <div class="panel">
        <div class="ph">
          <span class="pt">Equipe</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="badge-equipe" class="pbadge br"></span>
            <button class="badd" onclick="openModal('equipe')">
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Adicionar
            </button>
          </div>
        </div>
        <div id="list-equipe"></div>
      </div>
      <div class="panel">
        <div class="ph">
          <span class="pt">Ferramentas &amp; fixos</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="badge-fixos" class="pbadge br"></span>
            <button class="badd" onclick="openModal('fixo')">
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Adicionar
            </button>
          </div>
        </div>
        <div id="list-fixos"></div>
      </div>
    </div>

    <div class="dsec">Resultado</div>
    <div class="two-col">
      <div class="panel">
        <div class="ph"><span class="pt">Divisão de lucro</span><span class="pbadge bp">50 / 50</span></div>
        <div class="lucro-block" id="lucro-block"></div>
      </div>
      <div class="panel">
        <div class="ph"><span class="pt">Resumo do mês</span><span class="pbadge bb" id="badge-resumo"></span></div>
        <div id="resumo-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">Novo item</div>
    <div id="modal-body"></div>
    <div class="mactions">
      <button class="bsave" onclick="saveModal()">Salvar</button>
      <button class="bcancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

  {id:10,name:'Tráfego Ponto Charme',    value:1200, venc:28,   type:'trafego', status:{}},
  {id:11,name:'Confiança Mudanças',      value:1000, venc:null, type:'gestao',  status:{}},
  {id:12,name:'Tráfego Mavelu',          value:300,  venc:null, type:'trafego', status:{}},
  {id:13,name:'Eskenta Restobar',        value:null, venc:29,   type:'gestao',  status:{}},

const DEFAULT_EQUIPE = [
  {id:101, name:'Iago — gestor de tráfego', value:1600, dia:16},
  {id:102, name:'Letícia — social media',   value:null, dia:5},
  {id:103, name:'Marcus — videomaker',       value:null, dia:27},
];
const DEFAULT_FIXOS = [
  {id:201, name:'Freepik',    value:80,  dia:null},
  {id:202, name:'Design BR',  value:30,  dia:null},
  {id:203, name:'Google One', value:60,  dia:null},
  {id:204, name:'Internet',   value:150, dia:null},

];

async function hashPassword(pwd){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const input = document.getElementById('login-input');
  const err   = document.getElementById('login-err');
  const pwd   = input.value;
  if(!pwd){ err.textContent='Digite a senha.'; input.classList.add('err'); return; }
  const hash = await hashPassword(pwd);
  const correct = await hashPassword('@Duos2026');
  if(hash === correct){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    err.textContent='Senha incorreta.';
    input.classList.add('err');
    input.value='';
    setTimeout(()=>{ err.textContent=''; input.classList.remove('err'); },3000);
  }
}

function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  if(isSignedIn) signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-input').value='';
}

function toggleEye(){
  const inp = document.getElementById('login-input');
  inp.type = inp.type==='password'?'text':'password';
}

function checkSession(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }
}

function initApp(){
  loadLocal();
  loadGoogleScript();
}

function loadGoogleScript(){
  if(window.google && window.google.accounts){ initGoogleAuth(); return; }
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.async = true; s.defer = true;
  s.onload = initGoogleAuth;
  document.head.appendChild(s);
}

function initGoogleAuth(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if(resp.error){ setSyncStatus('err','erro ao conectar'); return; }
      accessToken = resp.access_token;
      isSignedIn  = true;
      document.getElementById('btn-signin').style.display   = 'none';
      document.getElementById('btn-signout').style.display  = 'flex';
      setSyncStatus('saving','carregando...');
      await initSheet();
      await loadFromSheet();
      setSyncStatus('ok','sincronizado');
    }
  });
  document.getElementById('btn-signin').style.display = 'flex';
  setSyncStatus('off','desconectado');
}

function setSyncStatus(state, text){
  const el = document.getElementById('sync-status');
  el.className = 'sync-status sync-'+state;
  document.getElementById('sync-text').textContent = text;
}

function signIn(){ tokenClient.requestAccessToken({prompt:''}); }
function signOut(){
  if(accessToken) google.accounts.oauth2.revoke(accessToken,()=>{});
  accessToken=null; isSignedIn=false;
  document.getElementById('btn-signin').style.display  = 'flex';
  document.getElementById('btn-signout').style.display = 'none';
  setSyncStatus('off','desconectado');
}

async function sheetsRequest(method,range,body=null){
  const base=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
  let url, opts={method,headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'}};
  if(method==='GET') url=`${base}/values/${encodeURIComponent(range)}`;
  else if(method==='PUT'){ url=`${base}/values/${encodeURIComponent(range)}?valueInputOption=RAW`; opts.body=JSON.stringify(body); }
  const r = await fetch(url,opts);
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function initSheet(){
  try{ await sheetsRequest('GET','Dados!A1'); }catch(e){}
}

async function loadFromSheet(){
  try{
    const r = await sheetsRequest('GET','Dados!B1:B1');
    if(!r.values||!r.values[0]){ await saveToSheet(); return; }
    const json=JSON.parse(r.values[0][0]);
    clientes=json.clientes||DEFAULT_CLIENTES;
    equipe=json.equipe||DEFAULT_EQUIPE;
    fixos=json.fixos||DEFAULT_FIXOS;
    nextId=json.nextId||300;
    render();
  }catch(e){ setSyncStatus('err','erro ao carregar'); }
}

async function saveToSheet(){
  if(!isSignedIn) return;
  setSyncStatus('saving','salvando...');
  try{
    await sheetsRequest('PUT','Dados!A1:B1',{values:[['DUOS_V1',JSON.stringify({clientes,equipe,fixos,nextId})]]});
    setSyncStatus('ok','sincronizado');
  }catch(e){ setSyncStatus('err','erro ao salvar'); }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ saveToSheet(); saveLocal(); },800);
}

function saveLocal(){
  try{ localStorage.setItem('duos-fin-v2',JSON.stringify({clientes,equipe,fixos,nextId})); }catch(e){}
}

function loadLocal(){
  try{
    const r=localStorage.getItem('duos-fin-v2');
    if(r){ const d=JSON.parse(r); clientes=d.clientes||DEFAULT_CLIENTES; equipe=d.equipe||DEFAULT_EQUIPE; fixos=d.fixos||DEFAULT_FIXOS; nextId=d.nextId||300; }
    else{ clientes=DEFAULT_CLIENTES; equipe=DEFAULT_EQUIPE; fixos=DEFAULT_FIXOS; }
  }catch(e){ clientes=DEFAULT_CLIENTES; equipe=DEFAULT_EQUIPE; fixos=DEFAULT_FIXOS; }
  render();
}

const brl=v=>v!=null&&v!==''&&!isNaN(parseFloat(v))?'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const monthKey=()=>`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
const typeMap={gestao:'Gestão',trafego:'Tráfego',full:'Full service',avulso:'Avulso'};

function getStatus(c){ return (c.status&&c.status[monthKey()])||'pendente'; }
function cycleStatus(id){
  const c=clientes.find(x=>x.id===id); if(!c) return;
  if(!c.status) c.status={};
  const cur=getStatus(c);
  c.status[monthKey()]=cur==='pendente'?'pago':cur==='pago'?'atrasado':'pendente';
  scheduleSave(); render();
}

function vencClass(dia){
  if(!dia) return '';
  if(dia===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear()) return 'vh';
  const v=new Date(currentYear,currentMonth,dia);
  if(v<today&&currentMonth===today.getMonth()&&currentYear===today.getFullYear()) return 'vat';
  return '';
}

const stMap={pago:{cls:'sp',icon:'✓',label:'Pago'},pendente:{cls:'se',icon:'○',label:'Pendente'},atrasado:{cls:'sa',icon:'!',label:'Atrasado'}};

function render(){
  document.getElementById('month-display').textContent=MONTHS[currentMonth]+' '+currentYear;
  const totalR=clientes.reduce((s,c)=>s+(c.value||0),0);
  const recebido=clientes.filter(c=>getStatus(c)==='pago').reduce((s,c)=>s+(c.value||0),0);
  const pendente=totalR-recebido;
  const totalEq=equipe.reduce((s,e)=>s+(e.value||0),0);
  const totalFx=fixos.reduce((s,e)=>s+(e.value||0),0);
  const totalG=totalEq+totalFx;
  const lucro=totalR-totalG;
  const lucroEach=lucro/2;
  const margem=totalR>0?((lucro/totalR)*100).toFixed(1):0;

  document.getElementById('summary-grid').innerHTML=`
    <div class="scard hi"><div class="abar"></div><div class="sc-label">Receita total</div><div class="sc-val">${brl(totalR)}</div><div class="sc-sub">${clientes.length} clientes</div></div>
    <div class="scard"><div class="abar" style="background:var(--green)"></div><div class="sc-label">Recebido</div><div class="sc-val" style="color:var(--green)">${brl(recebido)}</div><div class="sc-sub">${clientes.filter(c=>getStatus(c)==='pago').length} pagamentos</div></div>
    <div class="scard"><div class="abar" style="background:var(--amber)"></div><div class="sc-label">A receber</div><div class="sc-val" style="color:var(--amber)">${brl(pendente)}</div><div class="sc-sub">${clientes.filter(c=>getStatus(c)!=='pago').length} pendentes</div></div>
    <div class="scard"><div class="abar" style="background:var(--red)"></div><div class="sc-label">Total gastos</div><div class="sc-val" style="color:var(--red)">${brl(totalG)}</div><div class="sc-sub">equipe + fixos</div></div>
    <div class="scard"><div class="abar" style="background:var(--purple)"></div><div class="sc-label">Lucro líquido</div><div class="sc-val" style="color:var(--purple)">${brl(lucro)}</div><div class="sc-sub">${brl(lucroEach)} p/ sócio</div></div>`;

  const pg=clientes.filter(c=>getStatus(c)==='pago').length;
  const pd=clientes.filter(c=>getStatus(c)!=='pago').length;
  document.getElementById('badge-pg').textContent=pg+' pago'+(pg!==1?'s':'');
  document.getElementById('badge-pd').textContent=pd+' pendente'+(pd!==1?'s':'');

  document.getElementById('tbody-clientes').innerHTML=[...clientes].sort((a,b)=>(b.value||0)-(a.value||0)).map(c=>{
    const st=getStatus(c); const sc=stMap[st];
    const vc=c.venc?`<span class="vbadge ${vencClass(c.venc)}">dia ${c.venc}</span>`:`<span style="color:var(--text3);font-size:12px">—</span>`;
    return`<tr>
      <td class="tn">${c.name}</td>
      <td><span style="font-size:12px;color:var(--text3)">${typeMap[c.type]||c.type}</span></td>
      <td class="tv">${c.value?brl(c.value):`<span style="color:var(--text3)">a definir</span>`}</td>
      <td>${vc}</td>
      <td><button class="sbtn ${sc.cls}" onclick="cycleStatus(${c.id})">${sc.icon} ${sc.label}</button></td>
      <td>
        <button class="bicon" onclick="openModal('cliente',${c.id})" title="Editar">✎</button>
        <button class="bicon del" onclick="delItem('clientes',${c.id})" title="Remover">✕</button>
      </td></tr>`;
  }).join('');

  document.getElementById('badge-equipe').textContent=brl(totalEq);
  document.getElementById('list-equipe').innerHTML=equipe.map(e=>`
    <div class="erow">
      <div><div class="en">${e.name}</div><div class="ed">${e.dia?'pagamento dia '+e.dia:'sem data fixa'}</div></div>
      <div class="eactions">
        <div class="ev">${e.value?brl(e.value):`<span style="color:var(--text3);font-size:12px">a definir</span>`}</div>
        <button class="bicon" onclick="openModal('equipe',${e.id})" title="Editar">✎</button>
        <button class="bicon del" onclick="delItem('equipe',${e.id})" title="Remover">✕</button>
      </div></div>`).join('');

  document.getElementById('badge-fixos').textContent=brl(totalFx);
  document.getElementById('list-fixos').innerHTML=fixos.map(e=>`
    <div class="erow">
      <div><div class="en">${e.name}</div><div class="ed">fixo mensal</div></div>
      <div class="eactions">
        <div class="ev">${e.value?brl(e.value):`<span style="color:var(--text3);font-size:12px">a definir</span>`}</div>
        <button class="bicon" onclick="openModal('fixo',${e.id})" title="Editar">✎</button>
        <button class="bicon del" onclick="delItem('fixos',${e.id})" title="Remover">✕</button>
      </div></div>`).join('');

  const pctRec=totalR>0?Math.round((recebido/totalR)*100):0;
  document.getElementById('lucro-block').innerHTML=`
    <div class="lucro-row">
      <div style="display:flex;align-items:center;gap:10px"><div class="avatar avb">JN</div><div><div class="pname">Você</div><div class="ppct">50% do lucro</div></div></div>
      <div class="lval">${brl(lucroEach)}</div>
    </div>
    <div class="lucro-row">
      <div style="display:flex;align-items:center;gap:10px"><div class="avatar avp">PL</div><div><div class="pname">Paulo</div><div class="ppct">50% do lucro</div></div></div>
      <div class="lval">${brl(lucroEach)}</div>
    </div>
    <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:6px">${pctRec}% da receita recebida</div>
    <div class="pbar"><div class="pfill" style="width:${pctRec}%"></div></div>`;

  document.getElementById('badge-resumo').textContent=MONTHS[currentMonth];
  document.getElementById('resumo-list').innerHTML=`
    <div class="erow"><div><div class="en">Receita total</div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--blue)">${brl(totalR)}</div></div>
    <div class="erow"><div><div class="en">Equipe</div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--red)">- ${brl(totalEq)}</div></div>
    <div class="erow"><div><div class="en">Ferramentas &amp; fixos</div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--red)">- ${brl(totalFx)}</div></div>
    <div class="erow" style="background:var(--bg3)"><div><div class="en" style="font-weight:600">Lucro líquido</div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:${lucro>=0?'var(--green)':'var(--red)'}">${brl(lucro)}</div></div>
    <div class="erow"><div><div class="en">Margem</div></div><div style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text2)">${margem}%</div></div>`;
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  render();
}

function openModal(type,id=null){
  modalType=type; editId=id;
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  if(type==='cliente'){
    const c=id?clientes.find(x=>x.id===id):null;
    title.textContent=c?'Editar cliente':'Novo cliente';
    body.innerHTML=`
      <div class="fg"><label class="fl">Nome do cliente</label><input type="text" id="f-name" value="${c?c.name:''}" placeholder="Ex: Studio XYZ"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Valor mensal (R$)</label><input type="number" id="f-value" min="0" value="${c&&c.value?c.value:''}" placeholder="2000"></div>
        <div class="fg"><label class="fl">Dia de vencimento</label><input type="number" id="f-venc" min="1" max="31" value="${c&&c.venc?c.venc:''}" placeholder="10"></div>
      </div>
      <div class="fg"><label class="fl">Tipo de serviço</label>
        <select id="f-type">
          <option value="gestao" ${c&&c.type==='gestao'?'selected':''}>Gestão</option>
          <option value="trafego" ${c&&c.type==='trafego'?'selected':''}>Tráfego</option>
          <option value="full" ${c&&c.type==='full'?'selected':''}>Full service</option>
          <option value="avulso" ${c&&c.type==='avulso'?'selected':''}>Avulso</option>
        </select></div>`;
  } else if(type==='equipe'){
    const e=id?equipe.find(x=>x.id===id):null;
    title.textContent=e?'Editar membro':'Novo membro da equipe';
    body.innerHTML=`
      <div class="fg"><label class="fl">Nome e função</label><input type="text" id="f-name" value="${e?e.name:''}" placeholder="Ex: João — designer"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Valor mensal (R$)</label><input type="number" id="f-value" min="0" value="${e&&e.value?e.value:''}" placeholder="1500"></div>
        <div class="fg"><label class="fl">Dia de pagamento</label><input type="number" id="f-dia" min="1" max="31" value="${e&&e.dia?e.dia:''}" placeholder="10"></div>
      </div>`;
  } else if(type==='fixo'){
    const e=id?fixos.find(x=>x.id===id):null;
    title.textContent=e?'Editar gasto fixo':'Novo gasto fixo';
    body.innerHTML=`
      <div class="fg"><label class="fl">Descrição</label><input type="text" id="f-name" value="${e?e.name:''}" placeholder="Ex: Adobe Creative"></div>
      <div class="fg"><label class="fl">Valor mensal (R$)</label><input type="number" id="f-value" min="0" value="${e&&e.value?e.value:''}" placeholder="100"></div>`;
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>{ const el=document.getElementById('f-name'); if(el) el.focus(); },50);
}

function saveModal(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const value=parseFloat(document.getElementById('f-value')?.value)||null;
  if(!name){ alert('Informe o nome/descrição.'); return; }
  if(modalType==='cliente'){
    const venc=parseInt(document.getElementById('f-venc')?.value)||null;
    const type=document.getElementById('f-type')?.value||'gestao';
    if(editId){ const i=clientes.findIndex(x=>x.id===editId); if(i>-1) clientes[i]={...clientes[i],name,value,venc,type}; }
    else clientes.push({id:nextId++,name,value,venc,type,status:{}});
  } else if(modalType==='equipe'){
    const dia=parseInt(document.getElementById('f-dia')?.value)||null;
    if(editId){ const i=equipe.findIndex(x=>x.id===editId); if(i>-1) equipe[i]={...equipe[i],name,value,dia}; }
    else equipe.push({id:nextId++,name,value,dia});
  } else if(modalType==='fixo'){
    if(editId){ const i=fixos.findIndex(x=>x.id===editId); if(i>-1) fixos[i]={...fixos[i],name,value}; }
    else fixos.push({id:nextId++,name,value});
  }
  scheduleSave(); closeModal(); render();
}

function delItem(list,id){
  const map={clientes,equipe,fixos};
  const item=map[list]?.find(x=>x.id===id);
  if(!item||!confirm('Remover "'+item.name+'"?')) return;
  if(list==='clientes') clientes=clientes.filter(x=>x.id!==id);
  else if(list==='equipe') equipe=equipe.filter(x=>x.id!==id);
  else fixos=fixos.filter(x=>x.id!==id);
  scheduleSave(); render();
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); modalType=null; editId=null; }
function handleOverlay(e){ if(e.target===document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('login-input').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

checkSession();
</script>
