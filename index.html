<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duos Marketing — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --bg2: #161619;
  --bg3: #1e1e22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #c8f135;
  --accent2: #a8d020;
  --teal: #2dd4bf;
  --blue: #60a5fa;
  --amber: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.logo-name { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
.logo-sub { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.saved-badge { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.2); padding: 4px 10px; border-radius: 20px; opacity: 0; transition: opacity .4s; }
.btn-new { background: var(--accent); color: #111; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 6px; }
.btn-new:hover { background: var(--accent2); }
.container { max-width: 1080px; margin: 0 auto; padding: 28px 32px; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.metric-value { font-size: 22px; font-weight: 500; color: var(--text); }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.accent-line { width: 24px; height: 2px; background: var(--accent); border-radius: 2px; margin-bottom: 10px; }
.section { margin-bottom: 28px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-family: 'DM Mono', monospace; }
table { width: 100%; border-collapse: collapse; }
thead th { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-family: 'DM Mono', monospace; padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
tbody tr { transition: background .1s; }
tbody tr:hover td { background: var(--bg2); }
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); vertical-align: middle; }
tbody td:first-child { color: var(--text); font-weight: 400; }
.badge { display: inline-block; font-size: 10px; font-weight: 500; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.03em; }
.b-full { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
.b-gestao { background: rgba(45,212,191,0.08); color: var(--teal); border: 1px solid rgba(45,212,191,0.15); }
.b-trafego { background: rgba(96,165,250,0.08); color: var(--blue); border: 1px solid rgba(96,165,250,0.15); }
.b-avulso { background: rgba(251,191,36,0.08); color: var(--amber); border: 1px solid rgba(251,191,36,0.15); }
.bar-track { width: 100%; background: var(--bg3); border-radius: 3px; height: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.pct-text { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; min-width: 38px; text-align: right; }
.val-text { font-size: 13px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--text3); padding: 5px; border-radius: 6px; font-size: 14px; line-height: 1; transition: color .1s, background .1s; }
.btn-icon:hover { color: var(--text); background: var(--bg3); }
.btn-icon.danger:hover { color: var(--red); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } .container { padding: 20px 16px; } .topbar { padding: 14px 16px; } }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
.chart-title { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-name { font-size: 12px; color: var(--text2); width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.avulso-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 12px; }
.prog-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; min-width: 100px; }
.prog-fill { height: 100%; border-radius: 4px; background: var(--amber); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 460px; }
.modal-title { font-size: 15px; font-weight: 500; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
input, select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 12px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s; }
input:focus, select:focus { border-color: rgba(200,241,53,0.4); }
select option { background: var(--bg2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 1; background: var(--accent); color: #111; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; padding: 10px; border-radius: var(--radius); border: none; cursor: pointer; transition: background .15s; }
.btn-save:hover { background: var(--accent2); }
.btn-cancel-modal { background: none; border: 1px solid var(--border2); color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 10px 18px; border-radius: var(--radius); cursor: pointer; transition: border-color .15s; }
.btn-cancel-modal:hover { border-color: var(--border2); color: var(--text); }
.avulso-extra { display: none; }
.insight { border-left: 2px solid var(--border2); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: var(--text2); line-height: 1.6; }
.insight.warn { border-color: var(--amber); }
.insight.danger { border-color: var(--red); }
.insight.info { border-color: var(--teal); }
.insight strong { color: var(--text); font-weight: 500; }
.empty-state { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 16px 0; }
.btn-advance { background: none; border: 1px solid var(--border2); color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all .15s; }
.btn-advance:hover { border-color: var(--amber); color: var(--amber); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-name">Duos Marketing</div>
      <div class="logo-sub">dashboard de carteira</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="saved-badge" id="saved-badge">salvo</span>
    <button class="btn-new" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Novo cliente
    </button>
  </div>
</div>

<div class="container">
  <div class="metrics-grid" id="metrics"></div>

  <div class="two-col">
    <div class="section">
      <div class="section-header"><span class="section-title">Contratos recorrentes</span></div>
      <table>
        <thead>
          <tr>
            <th>cliente</th>
            <th>tipo</th>
            <th>valor</th>
            <th>part.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div>
      <div class="section">
        <div class="section-header"><span class="section-title">Distribuição</span></div>
        <div class="chart-card">
          <div class="chart-title">Receita por cliente</div>
          <div id="bar-chart"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><span class="section-title">Projetos avulsos</span></div>
    <div id="avulso-section"></div>
  </div>

  <div class="section">
    <div class="section-header"><span class="section-title">Alertas estratégicos</span></div>
    <div id="insights"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Novo cliente</div>
    <div class="form-group">
      <label class="form-label" for="f-name">Nome do cliente</label>
      <input type="text" id="f-name" placeholder="Ex: Studio XYZ">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="f-value">Valor mensal (R$)</label>
        <input type="number" id="f-value" placeholder="2000" min="0">
      </div>
      <div class="form-group">
        <label class="form-label" for="f-type">Tipo</label>
        <select id="f-type" onchange="toggleAvulso()">
          <option value="gestao">Gestão</option>
          <option value="trafego">Tráfego</option>
          <option value="full">Full service</option>
          <option value="avulso">Avulso</option>
        </select>
      </div>
    </div>
    <div class="avulso-extra form-row" id="avulso-extra">
      <div class="form-group">
        <label class="form-label" for="f-months">Total de meses</label>
        <input type="number" id="f-months" placeholder="4" min="1" max="24">
      </div>
      <div class="form-group">
        <label class="form-label" for="f-cur">Mês atual</label>
        <input type="number" id="f-cur" placeholder="1" min="1" max="24">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" id="btn-save" onclick="saveClient()">Salvar cliente</button>
      <button class="btn-cancel-modal" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const STORE = 'duos-v3';
const DEFAULT = [
  {id:1,name:'Bureau Contabilidade',value:4300,type:'full'},
  {id:2,name:'Tecendo a Provav',value:2800,type:'gestao'},
  {id:3,name:'Mercatto Forno e Brasa',value:2500,type:'gestao'},
  {id:4,name:'Pé de Coco',value:2350,type:'gestao'},
  {id:5,name:'Vila Rodeio',value:2000,type:'gestao'},
  {id:6,name:'Frango Cowboy',value:1800,type:'gestao'},
  {id:7,name:'iShop Tecnologia',value:1500,type:'gestao'},
  {id:8,name:'Bright Burguer',value:1500,type:'gestao'},
  {id:9,name:'Lucena Jóias',value:1400,type:'gestao'},
  {id:10,name:'Tráfego Ponto Charme',value:1200,type:'trafego'},
  {id:11,name:'Confiança Mudanças',value:1000,type:'gestao'},
  {id:12,name:'Tráfego Mavelu',value:300,type:'trafego'},
  {id:13,name:'Pé de Coco na Copa',value:1000,type:'avulso',months:4,currentMonth:1},
];

let clients = [], editId = null, nextId = 200;

function load(){
  try {
    const raw = localStorage.getItem(STORE);
    if(raw){ const d=JSON.parse(raw); clients=d.clients||DEFAULT; nextId=d.nextId||200; }
    else { clients=DEFAULT; }
  } catch(e){ clients=DEFAULT; }
  render();
}

function persist(){
  localStorage.setItem(STORE, JSON.stringify({clients,nextId}));
  const b=document.getElementById('saved-badge');
  b.style.opacity='1';
  setTimeout(()=>b.style.opacity='0',2000);
}

const brl = v => 'R$ '+Math.round(v).toLocaleString('pt-BR');
const badgeMap = {full:['b-full','full service'],gestao:['b-gestao','gestão'],trafego:['b-trafego','tráfego'],avulso:['b-avulso','avulso']};
const colorMap = {full:'var(--purple)',gestao:'var(--teal)',trafego:'var(--blue)',avulso:'var(--amber)'};

function render(){
  const rec = clients.filter(c=>c.type!=='avulso');
  const avs = clients.filter(c=>c.type==='avulso');
  const total = rec.reduce((s,c)=>s+c.value,0);
  const totalAv = avs.reduce((s,c)=>s+c.value,0);
  const avg = rec.length ? Math.round(total/rec.length) : 0;
  const maxC = rec.reduce((m,c)=>c.value>m.value?c:m, {value:0,name:'-'});

  document.getElementById('metrics').innerHTML = [
    ['Receita fixa/mês', brl(total), 'contratos recorrentes'],
    ['Total com avulsos', brl(total+totalAv), avs.length+' projeto(s) avulso(s)'],
    ['Clientes ativos', rec.length, clients.length+' total com avulsos'],
    ['Ticket médio', brl(avg), 'recorrentes'],
    ['Maior conta', brl(maxC.value), maxC.name],
  ].map(([l,v,s])=>`<div class="metric"><div class="accent-line"></div><div class="metric-label">${l}</div><div class="metric-value">${v}</div><div class="metric-sub">${s}</div></div>`).join('');

  const sorted = [...rec].sort((a,b)=>b.value-a.value);
  document.getElementById('tbody').innerHTML = sorted.map(c=>{
    const pct = total>0?((c.value/total)*100).toFixed(1):'0.0';
    const [bc,bl] = badgeMap[c.type]||badgeMap.gestao;
    return `<tr>
      <td>${c.name}</td>
      <td><span class="badge ${bc}">${bl}</span></td>
      <td class="val-text">${brl(c.value)}</td>
      <td style="min-width:80px">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${colorMap[c.type]||'var(--teal)'}"></div></div>
          <span class="pct-text">${pct}%</span>
        </div>
      </td>
      <td style="white-space:nowrap">
        <button class="btn-icon" onclick="startEdit(${c.id})" title="Editar">✎</button>
        <button class="btn-icon danger" onclick="del(${c.id})" title="Remover">✕</button>
      </td>
    </tr>`;
  }).join('');

  const allSorted = [...clients].sort((a,b)=>b.value-a.value);
  const maxV = allSorted[0]?.value||1;
  document.getElementById('bar-chart').innerHTML = allSorted.map(c=>{
    const pct = Math.round((c.value/maxV)*100);
    return `<div class="bar-row">
      <div class="bar-name" title="${c.name}">${c.name}</div>
      <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${colorMap[c.type]||'var(--teal)'}"></div></div>
      <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;width:52px;text-align:right;flex-shrink:0">${brl(c.value)}</div>
    </div>`;
  }).join('');

  const avSec = document.getElementById('avulso-section');
  if(avs.length===0){
    avSec.innerHTML='<p class="empty-state">Nenhum projeto avulso cadastrado.</p>';
  } else {
    avSec.innerHTML = avs.map(c=>{
      const m=c.months||4, cur=c.currentMonth||1;
      const pct=Math.round((cur/m)*100);
      const rem=brl(c.value*(m-cur));
      return `<div class="avulso-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px">
          <div>
            <div style="font-size:14px;font-weight:500;color:var(--text)">${c.name}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace">${brl(c.value)}/mês · ${m} meses · total ${brl(c.value*m)}</div>
          </div>
          <div style="flex:2;min-width:180px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px"><span>mês ${cur} de ${m}</span><span>${pct}% concluído</span></div>
            <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
            <div style="font-size:11px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace">${rem} restantes</div>
            <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
              <button class="btn-advance" onclick="advMonth(${c.id})">+ avançar mês</button>
              <button class="btn-icon" onclick="startEdit(${c.id})" title="Editar">✎</button>
              <button class="btn-icon danger" onclick="del(${c.id})" title="Remover">✕</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const ins = [];
  const top3sum = sorted.slice(0,3).reduce((s,c)=>s+c.value,0);
  const top3pct = total>0?Math.round((top3sum/total)*100):0;
  if(top3pct>40) ins.push({cls:'danger',text:`<strong>Concentração:</strong> os 3 maiores clientes somam <strong>${top3pct}%</strong> da receita. Saída de qualquer um exige reposição imediata.`});
  const lowTicket = rec.filter(c=>c.value<avg*0.6);
  if(lowTicket.length) ins.push({cls:'warn',text:`<strong>Contas abaixo do ticket médio:</strong> ${lowTicket.map(c=>c.name).join(', ')} — avaliar reposicionamento ou encerramento.`});
  const rest = rec.filter(c=>['Mercatto Forno e Brasa','Frango Cowboy','Bright Burguer'].includes(c.name));
  if(rest.length) ins.push({cls:'warn',text:`<strong>Segmento restaurantes ainda ativo:</strong> ${rest.map(c=>c.name).join(', ')} representam ${brl(rest.reduce((s,c)=>s+c.value,0))}/mês. Substituição planejada recomendada.`});
  ins.push({cls:'info',text:`<strong>Alvo estratégico (saúde / educação / jurídico):</strong> Bureau Contabilidade e Tecendo a Provav são os clientes mais alinhados ao novo posicionamento — e os de maior ticket.`});
  document.getElementById('insights').innerHTML = ins.map(i=>`<div class="insight ${i.cls}">${i.text}</div>`).join('');
}

function openModal(id=null){
  editId=id;
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=c?'Editar cliente':'Novo cliente';
  document.getElementById('btn-save').textContent=c?'Atualizar':'Salvar cliente';
  document.getElementById('f-name').value=c?c.name:'';
  document.getElementById('f-value').value=c?c.value:'';
  document.getElementById('f-type').value=c?c.type:'gestao';
  document.getElementById('f-months').value=c&&c.months?c.months:'';
  document.getElementById('f-cur').value=c&&c.currentMonth?c.currentMonth:1;
  document.getElementById('avulso-extra').style.display=c&&c.type==='avulso'?'grid':'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editId=null; }
function handleOverlayClick(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function toggleAvulso(){ document.getElementById('avulso-extra').style.display=document.getElementById('f-type').value==='avulso'?'grid':'none'; }
function startEdit(id){ openModal(id); }

function saveClient(){
  const name=document.getElementById('f-name').value.trim();
  const value=parseInt(document.getElementById('f-value').value)||0;
  const type=document.getElementById('f-type').value;
  const months=parseInt(document.getElementById('f-months').value)||4;
  const cur=parseInt(document.getElementById('f-cur').value)||1;
  if(!name||value<=0){ alert('Preencha nome e valor.'); return; }
  if(editId){
    const idx=clients.findIndex(x=>x.id===editId);
    if(idx>-1){ clients[idx]={...clients[idx],name,value,type}; if(type==='avulso'){clients[idx].months=months;clients[idx].currentMonth=cur;} }
  } else {
    const nc={id:nextId++,name,value,type};
    if(type==='avulso'){nc.months=months;nc.currentMonth=cur;}
    clients.push(nc);
  }
  persist(); closeModal(); render();
}

function del(id){
  const c=clients.find(x=>x.id===id);
  if(!c||!confirm('Remover "'+c.name+'"?')) return;
  clients=clients.filter(x=>x.id!==id);
  persist(); render();
}

function advMonth(id){
  const c=clients.find(x=>x.id===id);
  if(!c) return;
  if(c.currentMonth>=c.months){ alert('Projeto já concluído.'); return; }
  c.currentMonth=(c.currentMonth||1)+1;
  persist(); render();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
load();
</script>
</body>
</html>
